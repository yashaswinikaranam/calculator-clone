<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <input type="text" id="evaluating" class="display" autofocus>
        <div class="calculate">
            <div class="buttons">
                <button id="clear">AC</button>
                <button class="blue">()</button>
                <button class="blue">%</button>
                <button class="blue" id="divide">/</button>

                <button>7</button>
                <button>8</button>
                <button>9</button>
                <button class="blue" id="multiply">*</button>

                <button>4</button>
                <button>5</button>
                <button>6</button>
                <button class="blue" id="subtract">-</button>

                <button>1</button>
                <button>2</button>
                <button>3</button>
                <button class="blue" id="adding">+</button>

                <button>0</button>
                <button>.</button>
                <button id="cancel">CLR</button>
                <button id="equals">=</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
